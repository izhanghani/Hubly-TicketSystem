version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hubly-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - MAINTENANCE_MODE=${MAINTENANCE_MODE:-false}
      - ADMIN_DISABLED=${ADMIN_DISABLED:-false}
    volumes:
      # Persist data directory for uploads, logs, and database
      - hubly-data:/app/data
    restart: unless-stopped
    networks:
      - hubly-network
    # Uncomment for production with healthcheck
    # healthcheck:
    #   test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s

  # Optional: Development service for frontend hot-reload
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hubly-dev
    command: npm run dev
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
    volumes:
      # Bind mount source for live reload
      - ./src:/app/src
      - ./vite.config.js:/app/vite.config.js
      # Exclude node_modules
      - /app/node_modules
    restart: unless-stopped
    networks:
      - hubly-network

volumes:
  hubly-data:
    driver: local

networks:
  hubly-network:
    driver: bridge
